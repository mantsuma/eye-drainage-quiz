<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アイドレクイズ 230問版</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff5f7;padding:12px;color:#222;margin:0}
.box{background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);max-width:820px;margin:0 auto 16px}
h2{margin:0 0 10px;font-size:22px}
button{padding:12px 14px;margin:4px 0;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:15px}
.choice{display:block;width:100%;text-align:left}
.correct{background:#dff7e7!important;border:3px solid #1f9d55!important}
.wrong{background:#ffe1e1!important;border:3px solid #d93025!important}
#q{font-size:20px;font-weight:700;margin:12px 0;line-height:1.5}
#result{font-size:18px;margin:10px 0;display:none;padding:12px;border-radius:14px}
.result-ok{background:#dff7e7;color:#146c2e;border:2px solid #1f9d55}
.result-ng{background:#ffe1e1;color:#b42318;border:2px solid #d93025}
.badge{background:#fff0f4;color:#d46a8a;padding:5px 10px;border-radius:999px;display:inline-block;font-weight:700;font-size:13px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.active{background:#e8aebd;color:white;border-color:#e8aebd}
.note,.stat{color:#666;font-size:13px}
.answer-note{font-size:16px;margin-top:6px}
.bottom-bar{position:sticky;bottom:0;background:linear-gradient(to top,#fff5f7 65%, rgba(255,245,247,0));padding-top:10px;margin-top:10px}
#nextBtn{display:block;width:100%;font-size:18px;padding:14px 16px}
.secondary{font-size:14px;padding:10px 12px}
</style>
</head>
<body>
<div class="box">
<h2>アイドレクイズ 230問版</h2>
<div class="controls">
<button data-cat="すべて" class="filter active secondary">すべて</button>
<button data-cat="解剖編" class="filter secondary">解剖編</button>
<button data-cat="リンパ編" class="filter secondary">リンパ編</button>
<button data-cat="実践編" class="filter secondary">実践編</button>
<button id="wrongToggle" class="secondary">間違えた問題だけ</button>
</div>
<div class="note" id="count"></div>
<div class="stat" id="score"></div>
</div>

<div class="box">
<div class="badge" id="cat"></div>
<div id="q"></div>
<div id="choices"></div>
<div id="result"></div>
<div class="bottom-bar">
<button id="nextBtn">次へ</button>
</div>
</div>
